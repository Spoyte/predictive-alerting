# Example configuration for Predictive Alerting System

sources:
  prometheus:
    type: prometheus
    url: http://localhost:9090
    metrics:
      - cpu_usage_percent
      - memory_usage_percent
      - disk_io_read_bytes
      - disk_io_write_bytes
      - network_receive_bytes
      - network_transmit_bytes

  # Alternative: InfluxDB
  # influxdb:
  #   type: influxdb
  #   url: http://localhost:8086
  #   token: your-token-here
  #   org: your-org
  #   bucket: metrics
  #   metrics:
  #     - cpu
  #     - memory

  # Alternative: File-based (for testing)
  # sample:
  #   type: file
  #   path: ./sample_metrics.csv
  #   metrics:
  #     - cpu_usage

models:
  anomaly_detection:
    type: isolation_forest
    contamination: 0.01  # Expected proportion of anomalies

  forecasting:
    type: prophet
    horizon_minutes: 30  # How far ahead to predict

alerting:
  min_confidence: 0.8  # Minimum confidence to send alert (0-1)
  
  channels:
    # Webhook (generic)
    - type: webhook
      url: https://your-webhook-endpoint.com/alerts
      headers:
        Authorization: Bearer your-token
    
    # Slack
    # - type: slack
    #   url: https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK
    
    # PagerDuty
    # - type: pagerduty
    #   key: your-integration-key

# Collection interval
interval_seconds: 60
